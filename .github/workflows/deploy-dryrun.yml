name: Dry-run for Deployment

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "README.md"

jobs:
  dryrun:
    name: Dry-run for Deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile
      # - name: ESLint check
      #   run: yarn lint
      - name: Build website
        run: yarn build
# Standard dry-run workflow for Github
